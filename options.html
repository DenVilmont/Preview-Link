<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title data-i18n="settings_documentTitle"></title>
  <script
    src="preview-theme.js"
    data-apply-document-tokens="true"
    data-apply-document-foundation="true"
    data-bootstrap-document-theme="true"></script>
  <script src="preview-size-config.js" defer></script>
  <script src="preview-settings.js" defer></script>
  <script src="preview-i18n.js" defer></script>
  <script src="options.js" defer></script>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
    }

    .page {
      max-width: 980px;
      margin: 0 auto;
      padding: 32px 20px 48px;
    }

    .header {
      margin-bottom: 20px;
    }

    .header h1 {
      margin: 0 0 6px;
      font-size: 28px;
      font-weight: 600;
    }

    .header p {
      margin: 0;
      color: var(--pl-muted);
      font-size: 14px;
    }

    .status-toast {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 20;
      min-width: 260px;
      max-width: min(440px, calc(100vw - 32px));
      padding: 12px 16px;
      border: 1px solid var(--pl-notice-border);
      background: var(--pl-notice-bg);
      color: var(--pl-notice-text);
      border-radius: 14px;
      box-shadow: 0 14px 32px var(--pl-shadow-overlay);
      font-size: 13px;
      text-align: center;
      pointer-events: none;
    }

    .tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 18px;
    }

    .tab {
      border: 1px solid var(--pl-border);
      background: var(--pl-button-bg);
      color: var(--pl-text);
      border-radius: 999px;
      padding: 9px 14px;
      font-size: 14px;
      cursor: pointer;
    }

    .tab-active {
      background: var(--pl-accent-soft);
      border-color: var(--pl-accent);
      color: var(--pl-accent);
      font-weight: 600;
    }

    .panel {
      background: var(--pl-panel);
      border: 1px solid var(--pl-border);
      border-radius: 18px;
      padding: 22px;
      box-shadow: 0 14px 32px var(--pl-shadow-card);
    }

    .panel h2 {
      margin: 0 0 6px;
      font-size: 20px;
    }

    .panel-intro {
      margin: 0 0 18px;
      color: var(--pl-muted);
      font-size: 14px;
    }

    .section-grid {
      display: grid;
      gap: 16px;
    }

    .setting {
      border: 1px solid var(--pl-border);
      border-radius: 14px;
      padding: 14px 16px;
      background: var(--pl-panel-subtle);
    }

    .setting-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
    }

    .setting-title {
      margin: 0 0 4px;
      font-size: 15px;
      font-weight: 600;
    }

    .setting-copy {
      margin: 0;
      color: var(--pl-muted);
      font-size: 13px;
    }

    .inline-options,
    .stacked-options,
    .inline-inputs {
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
      margin-top: 12px;
    }

    .stacked-options {
      flex-direction: column;
      align-items: flex-start;
    }

    .interaction-details {
      display: grid;
      gap: 14px;
      margin-top: 14px;
      padding-top: 14px;
      border-top: 1px solid var(--pl-border);
    }

    .interaction-detail-title {
      margin: 0 0 4px;
      font-size: 14px;
      font-weight: 600;
    }

    .key-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 12px;
    }

    label.option,
    label.toggle {
      display: flex;
      gap: 8px;
      align-items: center;
      font-size: 14px;
    }

    input[type="number"],
    select {
      width: 120px;
      padding: 8px 10px;
      border: 1px solid var(--pl-border);
      border-radius: 10px;
      font-size: 14px;
      background: var(--pl-input-bg);
      color: var(--pl-text);
    }

    select {
      width: auto;
      min-width: 180px;
    }

    .field-error {
      min-height: 16px;
      margin-top: 6px;
      color: var(--pl-danger);
      font-size: 12px;
    }

    .helper {
      margin: 8px 0 0;
      color: var(--pl-muted);
      font-size: 12px;
    }

    .warning {
      margin-top: 12px;
      padding: 12px 14px;
      border: 1px solid var(--pl-warning-border);
      background: var(--pl-warning-bg);
      color: var(--pl-warning-text);
      border-radius: 12px;
      font-size: 13px;
      line-height: 1.45;
    }

    button.action {
      padding: 9px 14px;
      font-size: 14px;
      cursor: pointer;
    }

    button.danger {
      border-color: var(--pl-danger-border);
      color: var(--pl-danger);
      font-weight: 600;
    }

    @media (max-width: 720px) {
      .page {
        padding: 20px 14px 36px;
      }

      .panel {
        padding: 18px;
      }

      .setting-header {
        flex-direction: column;
        align-items: flex-start;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <header class="header">
      <h1 data-i18n="settings_header_title"></h1>
      <p data-i18n="settings_header_intro"></p>
    </header>

    <p class="status-toast" id="settings-status" role="status" aria-live="polite" hidden></p>

    <nav class="tabs" data-i18n-aria-label="settings_tabs_ariaLabel" role="tablist">
      <button type="button" class="tab" id="tab-general" data-tab-target="general" role="tab" aria-controls="panel-general" aria-selected="true" tabindex="0" data-i18n="settings_tabs_general"></button>
      <button type="button" class="tab" id="tab-preview-behavior" data-tab-target="preview-behavior" role="tab" aria-controls="panel-preview-behavior" aria-selected="false" tabindex="-1" data-i18n="settings_tabs_previewBehavior"></button>
      <button type="button" class="tab" id="tab-features" data-tab-target="features" role="tab" aria-controls="panel-features" aria-selected="false" tabindex="-1" data-i18n="settings_tabs_features"></button>
      <button type="button" class="tab" id="tab-compatibility" data-tab-target="compatibility" role="tab" aria-controls="panel-compatibility" aria-selected="false" tabindex="-1" data-i18n="settings_tabs_compatibility"></button>
      <button type="button" class="tab" id="tab-appearance-language" data-tab-target="appearance-language" role="tab" aria-controls="panel-appearance-language" aria-selected="false" tabindex="-1" data-i18n="settings_tabs_appearanceLanguage"></button>
      <button type="button" class="tab" id="tab-actions" data-tab-target="actions" role="tab" aria-controls="panel-actions" aria-selected="false" tabindex="-1" data-i18n="settings_tabs_actions"></button>
    </nav>

    <section class="panel" id="panel-general" data-tab-panel="general" role="tabpanel" aria-labelledby="tab-general" aria-hidden="false" tabindex="0">
      <h2 data-i18n="settings_general_title"></h2>
      <div class="section-grid">
        <div class="setting">
          <div class="setting-header">
            <div>
              <p class="setting-title" data-i18n="settings_enabled_title"></p>
              <p class="setting-copy" data-i18n="settings_enabled_description"></p>
            </div>
            <label class="toggle">
              <input type="checkbox" id="setting-enabled">
              <span data-i18n="common_active"></span>
            </label>
          </div>
        </div>

        <div class="setting">
          <p class="setting-title" data-i18n="settings_interaction_title"></p>
          <p class="setting-copy" data-i18n="settings_interaction_description"></p>
          <div class="stacked-options">
            <label class="option">
              <input type="radio" name="setting-interaction-type" id="setting-interaction-hover" value="hover">
              <span data-i18n="interaction_hover"></span>
            </label>
            <label class="option">
              <input type="radio" name="setting-interaction-type" id="setting-interaction-hover-with-key" value="hoverWithKey">
              <span data-i18n="interaction_hoverWithKey"></span>
            </label>
          </div>

          <div class="interaction-details">
            <div id="setting-hover-delay-row">
              <p class="interaction-detail-title" data-i18n="settings_hoverDelay_title"></p>
              <p class="setting-copy" data-i18n="settings_hoverDelay_description"></p>
              <div class="inline-inputs">
                <input type="number" id="setting-hover-delay" min="100" max="3000" step="100">
                <span class="helper" id="hover-delay-range"></span>
              </div>
              <div class="field-error" id="setting-hover-delay-error" aria-live="polite"></div>
            </div>

            <div id="setting-trigger-key-row" hidden>
              <p class="interaction-detail-title" data-i18n="settings_triggerKey_title"></p>
              <div class="key-row">
                <button type="button" class="action" id="setting-trigger-key-btn"></button>
                <span class="helper" id="setting-trigger-key-display"></span>
              </div>
            </div>
          </div>
        </div>
      </div>
    </section>

    <section class="panel" id="panel-preview-behavior" data-tab-panel="preview-behavior" role="tabpanel" aria-labelledby="tab-preview-behavior" aria-hidden="true" tabindex="-1" hidden>
      <h2 data-i18n="settings_previewBehavior_title"></h2>
      <div class="section-grid">
        <div class="setting">
          <p class="setting-title" data-i18n="settings_previewSize_title"></p>
          <p class="setting-copy" data-i18n="settings_previewSize_description"></p>
          <div class="inline-options">
            <label class="option">
              <input type="radio" name="setting-popup-size-unit" id="setting-popup-size-unit-percent" value="percent">
              <span data-i18n="settings_previewSize_percent"></span>
            </label>
            <label class="option">
              <input type="radio" name="setting-popup-size-unit" id="setting-popup-size-unit-px" value="px">
              <span data-i18n="settings_previewSize_pixels"></span>
            </label>
          </div>
          <p class="helper" id="setting-popup-size-helper"></p>
          <div class="inline-inputs">
            <label class="option"><span data-i18n="settings_previewSize_width"></span> <input type="number" id="setting-popup-width"></label>
            <label class="option"><span data-i18n="settings_previewSize_height"></span> <input type="number" id="setting-popup-height"></label>
          </div>
          <div class="field-error" id="setting-popup-width-error" aria-live="polite"></div>
          <div class="field-error" id="setting-popup-height-error" aria-live="polite"></div>
        </div>

        <div class="setting">
          <p class="setting-title" data-i18n="settings_maxPopups_title"></p>
          <div class="inline-inputs">
            <input type="number" id="setting-max-popups" min="1" step="1">
            <span class="helper" id="max-popups-min"></span>
          </div>
          <div class="field-error" id="setting-max-popups-error" aria-live="polite"></div>
        </div>
      </div>
    </section>

    <section class="panel" id="panel-features" data-tab-panel="features" role="tabpanel" aria-labelledby="tab-features" aria-hidden="true" tabindex="-1" hidden>
      <h2 data-i18n="settings_features_title"></h2>
      <div class="section-grid">
        <div class="setting">
          <label class="toggle setting-header">
            <span>
              <span class="setting-title" data-i18n="settings_readerMode_title"></span>
              <span class="setting-copy" data-i18n="settings_readerMode_description"></span>
            </span>
            <input type="checkbox" id="setting-reader-mode-suggestions">
          </label>
        </div>

        <div class="setting">
          <label class="toggle setting-header">
            <span>
              <span class="setting-title" data-i18n="settings_videoMode_title"></span>
              <span class="setting-copy" data-i18n="settings_videoMode_description"></span>
            </span>
            <input type="checkbox" id="setting-video-mode-enabled">
          </label>
        </div>
      </div>
    </section>

    <section class="panel" id="panel-compatibility" data-tab-panel="compatibility" role="tabpanel" aria-labelledby="tab-compatibility" aria-hidden="true" tabindex="-1" hidden>
      <h2 data-i18n="settings_compatibility_title"></h2>
      <p class="panel-intro" data-i18n="settings_compatibility_intro"></p>
      <div class="section-grid">
        <div class="setting">
          <label class="toggle setting-header">
            <span>
              <span class="setting-title" data-i18n="settings_aggressiveCompatibility_title"></span>
              <span class="setting-copy" data-i18n="settings_aggressiveCompatibility_description"></span>
            </span>
            <input type="checkbox" id="setting-aggressive-compatibility-mode">
          </label>
          <div class="warning" data-i18n="settings_aggressiveCompatibility_warning"></div>
        </div>
      </div>
    </section>

    <section class="panel" id="panel-appearance-language" data-tab-panel="appearance-language" role="tabpanel" aria-labelledby="tab-appearance-language" aria-hidden="true" tabindex="-1" hidden>
      <h2 data-i18n="settings_appearance_title"></h2>
      <div class="section-grid">
        <div class="setting">
          <p class="setting-title" data-i18n="settings_theme_title"></p>
          <div class="inline-inputs">
            <label class="option" for="setting-theme-mode">
              <span data-i18n="common_mode"></span>
            </label>
            <select id="setting-theme-mode">
              <option value="light" data-i18n="settings_theme_light"></option>
              <option value="dark" data-i18n="settings_theme_dark"></option>
              <option value="auto" data-i18n="settings_theme_auto"></option>
            </select>
          </div>
        </div>

        <div class="setting">
          <p class="setting-title" data-i18n="settings_language_title"></p>
          <div class="inline-inputs">
            <label class="option" for="setting-language">
              <span data-i18n="common_language"></span>
            </label>
            <select id="setting-language">
              <option value="auto" data-i18n="settings_language_option_auto"></option>
              <option value="en" data-i18n="settings_language_option_en"></option>
              <option value="ru" data-i18n="settings_language_option_ru"></option>
              <option value="es" data-i18n="settings_language_option_es"></option>
              <option value="zh_CN" data-i18n="settings_language_option_zh_CN"></option>
            </select>
          </div>
        </div>
      </div>
    </section>

    <section class="panel" id="panel-actions" data-tab-panel="actions" role="tabpanel" aria-labelledby="tab-actions" aria-hidden="true" tabindex="-1" hidden>
      <h2 data-i18n="settings_actions_title"></h2>
      <div class="section-grid">
        <div class="setting">
          <p class="setting-copy" data-i18n="settings_reset_description"></p>
          <div class="inline-inputs">
            <button type="button" class="action danger" id="reset-settings-btn" data-i18n="settings_reset_button"></button>
          </div>
        </div>
      </div>
    </section>
  </div>
</body>
</html>
