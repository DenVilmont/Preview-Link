<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title data-i18n="popup_documentTitle"></title>
  <script
    src="preview-theme.js"
    data-apply-document-tokens="true"
    data-apply-document-foundation="true"
    data-bootstrap-document-theme="true"></script>
  <script src="preview-size-config.js" defer></script>
  <script src="preview-settings.js" defer></script>
  <script src="preview-i18n.js" defer></script>
  <script src="popup.js" defer></script>
  <style>
    body {
      padding: 14px;
      width: 260px;
    }

    .card {
      background: var(--pl-panel);
      border: 1px solid var(--pl-border);
      border-radius: 14px;
      padding: 14px;
      box-shadow: 0 10px 30px var(--pl-shadow-card);
    }

    h1 {
      margin: 0 0 4px;
      font-size: 16px;
      font-weight: 600;
    }

    .subtitle {
      margin: 0 0 14px;
      color: var(--pl-muted);
      font-size: 12px;
    }

    .section {
      border: 1px solid var(--pl-border);
      border-radius: 12px;
      padding: 12px;
      background: var(--pl-panel-subtle);
      margin-bottom: 12px;
    }

    .section:last-of-type {
      margin-bottom: 0;
    }

    .section-title {
      margin: 0 0 4px;
      font-size: 13px;
      font-weight: 600;
    }

    .section-copy {
      margin: 0 0 10px;
      color: var(--pl-muted);
      font-size: 12px;
    }

    .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
    }

    .mode-group {
      display: grid;
      gap: 8px;
      margin-bottom: 12px;
    }

    .mode-option {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
    }

    .interaction-details {
      display: grid;
      gap: 10px;
    }

    .detail {
      border-top: 1px solid var(--pl-border);
      padding-top: 10px;
    }

    .detail-label {
      display: block;
      margin-bottom: 8px;
      font-size: 12px;
      font-weight: 600;
      color: var(--pl-muted);
    }

    .inline-control {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .key-control {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .key-value {
      min-width: 0;
      flex: 1;
      text-align: right;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .switch {
      position: relative;
      display: inline-block;
      width: 42px;
      height: 22px;
    }

    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .slider {
      position: absolute;
      inset: 0;
      border-radius: 999px;
      background: var(--pl-switch-track);
      transition: background 0.2s ease;
    }

    .slider::before {
      content: "";
      position: absolute;
      width: 18px;
      height: 18px;
      left: 2px;
      top: 2px;
      border-radius: 50%;
      background: var(--pl-button-bg);
      transition: transform 0.2s ease;
      box-shadow: 0 1px 3px var(--pl-shadow-control);
    }

    .switch input:checked + .slider {
      background: var(--pl-accent);
    }

    .switch input:checked + .slider::before {
      transform: translateX(20px);
    }

    input[type="range"] {
      flex: 1;
      accent-color: var(--pl-accent);
    }

    button {
      padding: 8px 10px;
      font-size: 13px;
      cursor: pointer;
    }

    button.primary {
      width: 100%;
      margin-top: 8px;
      background: var(--pl-accent);
      border-color: var(--pl-accent);
      color: #ffffff;
      font-weight: 600;
    }

    .muted {
      color: var(--pl-muted);
      font-size: 12px;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1 data-i18n="common_appName"></h1>
    <p class="subtitle" data-i18n="popup_subtitle"></p>

    <div class="section">
      <div class="row">
        <span data-i18n="common_enabled"></span>
        <label class="switch">
          <input type="checkbox" id="toggle-enabled">
          <span class="slider"></span>
        </label>
      </div>
    </div>

    <div class="section">
      <p class="section-title" data-i18n="popup_interaction_title"></p>
      <p class="section-copy" data-i18n="popup_interaction_description"></p>

      <div class="mode-group" data-i18n-aria-label="a11y_interactionMode">
        <label class="mode-option">
          <input type="radio" name="interaction-type" value="hover" id="interaction-hover">
          <span data-i18n="interaction_hover"></span>
        </label>
        <label class="mode-option">
          <input type="radio" name="interaction-type" value="hoverWithKey" id="interaction-hover-with-key">
          <span data-i18n="interaction_hoverWithKey"></span>
        </label>
      </div>

      <div class="interaction-details">
        <div class="detail" id="delay-row">
          <span class="detail-label" data-i18n="settings_hoverDelay_title"></span>
          <div class="inline-control">
            <input type="range" id="hover-delay" min="100" max="3000" step="100">
            <span class="muted" id="hover-delay-label"></span>
          </div>
        </div>

        <div class="detail" id="key-row" hidden>
          <span class="detail-label" data-i18n="settings_triggerKey_title"></span>
          <div class="key-control">
            <button type="button" id="set-key-btn"></button>
            <span class="muted key-value" id="key-display"></span>
          </div>
        </div>
      </div>
    </div>

    <button type="button" class="primary" id="open-settings-btn" data-i18n="popup_openSettings"></button>
  </div>
</body>
</html>
