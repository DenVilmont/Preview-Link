<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Preview Link</title>
  <script src="popup.js" defer></script>
  <style>
    :root { --accent: #4f8cff; --bg: #fcfcfc; --text: #333333; --light: #f0f4ff; }
    body { margin:0; padding:16px; font-family: Arial, sans-serif; background: var(--bg); color: var(--text); width: 260px;
      border-radius: 8px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.1);
      transition: box-shadow 0.2s ease;
    }
    h3 { margin:0 0 16px; font-size: 18px; font-weight: normal; border-bottom: 1px solid #e0e0e0; padding-bottom: 8px; }
    .setting { display:flex; align-items:center; justify-content:space-between; margin-bottom: 16px; }
    .setting label { font-size: 14px; color: #555555; }
    input[type="number"] { width: 60px; padding: 4px 8px; border: 1px solid #ccc; border-radius: 4px; font-size: 14px; }
    .switch { position: relative; display: inline-block; width: 40px; height: 20px; }
    .switch input { opacity: 0; width: 0; height: 0; }
    .switch .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background: #ccc; transition: 0.4s; border-radius: 20px; }
    .switch .slider:before { position: absolute; content: ""; height: 16px; width: 16px; left: 2px; bottom: 2px; background: white; transition: 0.4s; border-radius: 50%; }
    .switch input:checked + .slider { background: var(--accent); }
    .switch input:checked + .slider:before { transform: translateX(20px); }
    .range-container { display:flex; align-items:center; }
    input[type="range"] { flex: 1; margin: 0 8px; }
    .range-value { width: 40px; text-align: right; font-size: 14px; color: #555555; }
    .setting select {
      padding: 4px 8px;
      border: 1px solid #ccc;
      border-radius: 4px;
      background: #fff;
      font-size: 14px;
    }
    .interaction-options { display: flex; flex-direction: column; gap: 12px; margin-top: 8px; }
    .option-block { display: flex; flex-direction: column; }
    .key-selector { margin-top: 4px; display: none; align-items: center; margin-left: 20px; }
    #delay-container { margin-top: 4px; display: none; margin-left: 20px; }
    .separator { height: 1px; border: none; background: linear-gradient(to right, transparent, #ccc, transparent); margin: 12px 0; }
    #interaction-setting {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
    }
    #interaction-setting > label {
      margin-bottom: 8px;
    }
    /* Estilo moderno para radio buttons */
    #interaction-setting input[type="radio"] {
      -webkit-appearance: none;
      appearance: none;
      width: 16px;
      height: 16px;
      border: 2px solid var(--accent);
      border-radius: 50%;
      margin-right: 8px;
      position: relative;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s;
    }
    #interaction-setting input[type="radio"]::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 8px;
      height: 8px;
      background: var(--accent);
      border-radius: 50%;
      transform: translate(-50%, -50%) scale(0);
      transition: transform 0.2s;
    }
    #interaction-setting input[type="radio"]:checked {
      border-color: var(--accent);
      background: var(--accent);
    }
    #interaction-setting input[type="radio"]:checked::after {
      transform: translate(-50%, -50%) scale(1);
    }
    /* Estilo moderno para botón Set key */
    #set-key-btn {
      padding: 6px 12px;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 4px;
      font-size: 14px;
      cursor: pointer;
      transition: background 0.2s;
    }
    #set-key-btn:hover {
      background: #3e7bd1;
    }
    #set-key-btn:focus {
      outline: 2px solid #fff;
      outline-offset: 2px;
    }
    /* Espacio y mayúsculas para el texto de la tecla */
    #key-display {
      margin-left: 8px;
      text-transform: uppercase;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <h3>Preview Link</h3>
  <div class="setting">
    <label for="toggle-enabled">Enable</label>
    <label class="switch">
      <input type="checkbox" id="toggle-enabled">
      <span class="slider"></span>
    </label>
  </div>
  <div class="setting">
    <label for="max-popups">Max popups</label>
    <input type="number" id="max-popups" min="1">
  </div>
  <div class="separator"></div>
  <div class="setting" id="interaction-setting">
    <label>Open trigger</label>
    <div class="interaction-options">
      <div class="option-block">
        <label><input type="radio" name="interaction-type" value="hover" id="interaction-hover"> Hover only</label>
        <div class="range-container" id="delay-container">
          <label for="hover-delay">Delay (ms)</label>
          <input type="range" id="hover-delay" min="100" max="3000" step="100">
          <span class="range-value" id="hover-delay-label">2000</span>
        </div>
      </div>
      <div class="option-block">
        <label><input type="radio" name="interaction-type" value="button" id="interaction-button"> Hover + key</label>
        <div class="key-selector" id="key-selector">
          <button id="set-key-btn">Set key</button>
          <span id="key-display">None</span>
        </div>
      </div>
    </div>
  </div>
  <div class="separator"></div>
</body>
</html>
